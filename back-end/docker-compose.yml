version: '3.8'

services:
  postgres:
    image: postgres:16  
    container_name: faladoutor_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: faladoutor_db
    
    ports:
      - "5434:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    networks:
      - faladoutor_network
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faladoutor_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  faladoutor_network:
    driver: bridge
